<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thành công | PawPals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/password-reset.css}">
    <link rel="stylesheet" th:href="@{/header.css}">
</head>
<body>
<div class="reset-page">
    <div th:replace="fragments/header :: header"></div>

    <section class="reset-section">
        <div class="reset-card success-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>

            <h2>Mật khẩu đã được thay đổi thành công</h2>

            <p class="success-description">
                Bạn đã tạo mật khẩu mới thành công, mỗi bạn<br>
                quay trở lại trang đăng nhập bằng nút phía dưới
            </p>

            <a th:href="@{/login}" class="reset-btn">Quay lại đăng nhập</a>
        </div>
    </section>
</div>
</body>
</html>
