<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit your community post on PawPals.">
    <title>Edit Post - PawPals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/header.css}">
    <link rel="stylesheet" th:href="@{/footer.css}">
    <link rel="stylesheet" th:href="@{/community.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container community-page-wrapper">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <a th:href="@{/community/post/{id}(id=${postId})}" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Back to Post
                </a>

                <div class="card form-card">
                    <div class="card-header">
                        <i class="bi bi-pencil me-2" style="color:#5d6fd6;"></i> Edit Post
                    </div>
                    <div class="card-body">
                        <form th:action="@{/community/edit/{id}(id=${postId})}" th:object="${createPostDto}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                                <input type="text" id="title" th:field="*{title}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="categoryId" class="form-label">Category <span class="text-danger">*</span></label>
                                <select id="categoryId" th:field="*{categoryId}" class="form-select" required>
                                    <option value="">-- Select Category --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.categoryId}"
                                            th:text="${cat.categoryName}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="thumbnailUrl" class="form-label">Thumbnail URL</label>
                                <input type="url" id="thumbnailUrl" th:field="*{thumbnailUrl}" class="form-control"
                                       placeholder="https://example.com/image.jpg">
                                <div class="form-text" style="color:rgba(29,61,57,0.60);">
                                    Optional: Add an image URL for the post thumbnail.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="content" class="form-label">Content <span class="text-danger">*</span></label>
                                <textarea id="content" th:field="*{content}" class="form-control" rows="12" required></textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/community/post/{id}(id=${postId})}" class="btn btn-secondary"
                                   style="border-radius:50px; font-family:'Baloo 2',cursive; font-weight:600;">
                                    Cancel
                                </a>
                                <button type="submit" class="btn-create-post" style="padding:10px 28px; background: linear-gradient(135deg,#5d6fd6,#7387d8);">
                                    <i class="bi bi-check-lg"></i> Update Post
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
