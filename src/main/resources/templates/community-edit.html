<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chỉnh sửa bài viết cộng đồng trên PawPals.">
    <title>Chỉnh sửa bài viết - PawPals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/header.css}">
    <link rel="stylesheet" th:href="@{/footer.css}">
    <link rel="stylesheet" th:href="@{/community.css}">
    <div th:replace="fragments/google-analytics :: googleAnalytics"></div>
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container community-page-wrapper">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <a th:href="@{/community/post/{id}(id=${postId})}" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Quay lại bài viết
                </a>

                <div class="card form-card">
                    <div class="card-header">
                        <i class="bi bi-pencil me-2" style="color:#5d6fd6;"></i> Chỉnh sửa bài viết
                    </div>
                    <div class="card-body">
                        <form th:action="@{/community/edit/{id}(id=${postId})}" th:object="${createPostDto}" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="title" class="form-label">Tiêu đề <span class="text-danger">*</span></label>
                                <input type="text" id="title" th:field="*{title}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="categoryId" class="form-label">Danh mục <span class="text-danger">*</span></label>
                                <select id="categoryId" th:field="*{categoryId}" class="form-select" required>
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.categoryId}"
                                            th:text="${cat.categoryName}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="thumbnailFile" class="form-label">Ảnh đại diện</label>
                                <input type="file" id="thumbnailFile" name="thumbnailFile" class="form-control"
                                       accept="image/*">
                                <div class="form-text" style="color:rgba(29,61,57,0.60);">
                                    Không bắt buộc: Chọn ảnh mới từ máy tính nếu muốn thay đổi ảnh đại diện.
                                </div>
                                <!-- Show current thumbnail -->
                                <div id="currentThumbnail" class="mt-2" th:if="${createPostDto.thumbnailUrl != null and !createPostDto.thumbnailUrl.isEmpty()}">
                                    <p class="mb-1" style="font-size:0.85rem; color:rgba(29,61,57,0.60);">Ảnh hiện tại:</p>
                                    <img th:src="${createPostDto.thumbnailUrl}" alt="Current thumbnail"
                                         style="max-width:200px; max-height:200px; border-radius:8px; object-fit:cover;">
                                </div>
                                <!-- New image preview -->
                                <div id="thumbnailPreview" class="mt-2" style="display:none;">
                                    <p class="mb-1" style="font-size:0.85rem; color:rgba(29,61,57,0.60);">Ảnh mới:</p>
                                    <img id="previewImage" src="#" alt="Preview" style="max-width:200px; max-height:200px; border-radius:8px; object-fit:cover;">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="content" class="form-label">Nội dung <span class="text-danger">*</span></label>
                                <textarea id="content" th:field="*{content}" class="form-control" rows="12" required></textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/community/post/{id}(id=${postId})}" class="btn btn-secondary"
                                   style="border-radius:50px; font-family:'Baloo 2',cursive; font-weight:600;">
                                    Hủy
                                </a>
                                <button type="submit" class="btn-create-post" style="padding:10px 28px; background: linear-gradient(135deg,#5d6fd6,#7387d8);">
                                    <i class="bi bi-check-lg"></i> Cập nhật bài viết
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Preview image before upload
        document.getElementById('thumbnailFile').addEventListener('change', function(e) {
            const preview = document.getElementById('thumbnailPreview');
            const previewImage = document.getElementById('previewImage');
            const file = e.target.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
                previewImage.src = '#';
            }
        });
    </script>
</body>
</html>
