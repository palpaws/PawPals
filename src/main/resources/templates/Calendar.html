<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lịch dịch vụ - PawPals</title>

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600&family=Hannari&display=swap" rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <!-- HEADER CSS -->
    <link rel="stylesheet" th:href="@{/header.css}">

    <!-- CALENDAR CSS -->
    <link rel="stylesheet" th:href="@{/calendar.css}">
    <div th:replace="fragments/google-analytics :: googleAnalytics"></div>
</head>
<body>

<div class="page">

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<div class="calendar-container">
    <!-- LEFT SIDEBAR: Bộ lọc & danh sách dịch vụ -->
    <div class="sidebar-left">
        <h2>Đặt lịch</h2>

        <div class="form-group">
            <label>Loại dịch vụ</label>
            <select id="serviceTypeFilter" onchange="loadServices()">
                <option value="">-- Tất cả dịch vụ --</option>
                <option value="KHAM">🏥 Khám bệnh</option>
                <option value="SPA">💆 Spa / Tắm rửa</option>
                <option value="PHOI_GIONG">🐾 Phối giống</option>
                <option value="VACCINE">💉 Tiêm chủng</option>
            </select>
        </div>

        <h3 style="margin-top:16px;"><i class="fas fa-store"></i> Chọn shop / dịch vụ</h3>
        <div class="service-list" id="serviceList">
            <div class="no-events-msg">Đang tải dịch vụ...</div>
        </div>
    </div>

    <!-- CALENDAR -->
    <div class="calendar-wrapper">
        <div class="calendar-header">
            <button id="prevBtn" onclick="previousMonth()">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h3 id="monthYear"></h3>
            <button id="nextBtn" onclick="nextMonth()">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <div id="selectedServiceBanner" class="selected-service-banner" style="display:none;"></div>

        <table class="calendar-grid" id="calendar">
            <thead>
                <tr>
                    <th>Thứ 2</th>
                    <th>Thứ 3</th>
                    <th>Thứ 4</th>
                    <th>Thứ 5</th>
                    <th>Thứ 6</th>
                    <th>Thứ 7</th>
                    <th>CN</th>
                </tr>
            </thead>
            <tbody id="calendarBody">
            </tbody>
        </table>

        <div class="calendar-hint">
            <i class="fas fa-info-circle"></i>
            Chọn một dịch vụ, sau đó bấm vào ngày có khung giờ trống để đăng ký. Những ngày trong quá khứ không thể đăng ký.
        </div>
    </div>

    <!-- RIGHT SIDEBAR: Lịch đã đặt -->
    <div class="sidebar-right">
        <h3><i class="fas fa-calendar-check"></i> Lịch đã đặt</h3>
        <div class="schedule-list" id="bookingList">
            <div class="no-events-msg" id="noBookingsMsg">
                <i class="fas fa-calendar"></i><br>
                Chưa có lịch đặt nào
            </div>
        </div>
    </div>
</div>

<!-- MODAL: Chọn khung giờ trong ngày -->
<div class="modal-overlay" id="slotModal">
    <div class="modal">
        <h3 id="slotModalTitle"><i class="fas fa-clock"></i> Chọn khung giờ</h3>
        <div id="slotModalContent" class="slot-grid"></div>
        <div class="modal-actions">
            <button type="button" class="btn-cancel" onclick="closeSlotModal()">Đóng</button>
        </div>
    </div>
</div>

<!-- MODAL: Xác nhận đăng ký + thanh toán -->
<div class="modal-overlay" id="bookingModal">
    <div class="modal">
        <h3><i class="fas fa-calendar-plus"></i> Xác nhận đăng ký</h3>
        <div id="bookingSummary" class="booking-summary"></div>

        <form id="bookingForm" onsubmit="submitBooking(event)">
            <div class="form-group">
                <label>Thú cưng (không bắt buộc)</label>
                <select id="formPetId">
                    <option value="">-- Không chọn --</option>
                    <option th:each="pet : ${pets}"
                            th:value="${pet.petId}"
                            th:text="${pet.petName}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Ghi chú</label>
                <textarea id="formNote" placeholder="Ghi chú thêm cho shop..."></textarea>
            </div>

            <div class="form-group">
                <label>Thanh toán</label>
                <div class="payment-options">
                    <label class="payment-option">
                        <input type="radio" name="paymentType" value="DEPOSIT" checked>
                        <span>Cọc <strong id="depositLabel">50%</strong> (<span id="depositAmount">0</span>đ)</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="paymentType" value="FULL">
                        <span>Trả đủ (<span id="fullAmount">0</span>đ)</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="paymentType" value="NONE">
                        <span>Chưa thanh toán (trả tại shop)</span>
                    </label>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeBookingModal()">Hủy</button>
                <button type="submit" class="btn-save">Đăng ký lịch</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ===== STATE =====
    let currentDate = new Date();
    let selectedService = null;      // dịch vụ đang chọn
    let slotsByDate = {};            // { 'YYYY-MM-DD': [slot,...] }
    let selectedSlot = null;         // slot đang chọn để đăng ký

    const TYPE_ICONS = {
        'KHAM': '🏥', 'SPA': '💆', 'PHOI_GIONG': '🐾', 'VACCINE': '💉'
    };

    function formatMoney(v) {
        if (v == null) return '0';
        return Math.round(v).toLocaleString('vi-VN');
    }

    // ===== LOAD SERVICES =====
    function loadServices() {
        const type = document.getElementById('serviceTypeFilter').value;
        let url = '/api/booking/services';
        if (type) url += '?serviceType=' + type;

        fetch(url)
            .then(res => res.json())
            .then(data => renderServiceList(data))
            .catch(err => {
                console.error('Lỗi tải dịch vụ:', err);
                document.getElementById('serviceList').innerHTML =
                    '<div class="no-events-msg">Không tải được dịch vụ</div>';
            });
    }

    function renderServiceList(services) {
        const list = document.getElementById('serviceList');
        if (!services || services.length === 0) {
            list.innerHTML = '<div class="no-events-msg">Chưa có dịch vụ nào</div>';
            return;
        }
        list.innerHTML = '';
        services.forEach(s => {
            const div = document.createElement('div');
            div.className = 'service-card';
            div.onclick = () => selectService(s);
            div.setAttribute('data-service-id', s.serviceId);
            div.innerHTML =
                '<div class="service-card-title">' + (TYPE_ICONS[s.serviceType] || '') + ' ' + s.name + '</div>' +
                '<div class="service-card-shop"><i class="fas fa-store"></i> ' + (s.shopName || '') + '</div>' +
                '<div class="service-card-meta">' +
                    '<span><i class="fas fa-tag"></i> ' + formatMoney(s.price) + 'đ</span>' +
                    '<span><i class="fas fa-star"></i> ' + (s.shopRating != null ? s.shopRating : '-') + '</span>' +
                '</div>';
            list.appendChild(div);
        });
    }

    function selectService(service) {
        selectedService = service;
        document.querySelectorAll('.service-card').forEach(c => {
            c.classList.toggle('active', parseInt(c.getAttribute('data-service-id')) === service.serviceId);
        });

        const banner = document.getElementById('selectedServiceBanner');
        banner.style.display = 'block';
        banner.innerHTML =
            '<strong>' + (TYPE_ICONS[service.serviceType] || '') + ' ' + service.name + '</strong> — ' +
            (service.shopName || '') + ' · ' + formatMoney(service.price) + 'đ';

        loadSlots();
    }

    // ===== CALENDAR =====
    function generateCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);

        const calendarBody = document.getElementById('calendarBody');
        calendarBody.innerHTML = '';

        const startingDayOfWeek = (firstDay.getDay() + 6) % 7;

        const today = new Date();
        const todayStr = today.getFullYear() + '-' +
            String(today.getMonth() + 1).padStart(2, '0') + '-' +
            String(today.getDate()).padStart(2, '0');

        let row = document.createElement('tr');

        const prevMonthLastDay = new Date(year, month, 0).getDate();
        for (let i = startingDayOfWeek - 1; i >= 0; i--) {
            const cell = document.createElement('td');
            cell.className = 'other-month';
            cell.innerHTML = '<div class="day-number">' + (prevMonthLastDay - i) + '</div>';
            row.appendChild(cell);
        }

        for (let day = 1; day <= lastDay.getDate(); day++) {
            if (row.children.length === 7) {
                calendarBody.appendChild(row);
                row = document.createElement('tr');
            }

            const cell = document.createElement('td');
            const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');

            let cellClass = '';
            if (dateStr === todayStr) cellClass = 'today';
            const isPast = dateStr < todayStr;
            if (isPast) cellClass += ' past-day';
            cell.className = cellClass.trim();

            let cellHTML = '<div class="day-number">' + day + '</div>';

            const daySlots = slotsByDate[dateStr] || [];
            const availableCount = daySlots.filter(s => s.bookable).length;

            if (selectedService && daySlots.length > 0) {
                if (isPast) {
                    cellHTML += '<span class="slot-badge slot-past">Đã qua</span>';
                } else if (availableCount > 0) {
                    cellHTML += '<span class="slot-badge slot-available">' + availableCount + ' giờ trống</span>';
                } else {
                    cellHTML += '<span class="slot-badge slot-full">Hết chỗ</span>';
                }
            }

            cell.innerHTML = cellHTML;

            if (selectedService && !isPast && availableCount > 0) {
                cell.classList.add('clickable');
                cell.addEventListener('click', () => openSlotModal(dateStr));
            }

            row.appendChild(cell);
        }

        let nextDay = 1;
        while (row.children.length < 7) {
            const cell = document.createElement('td');
            cell.className = 'other-month';
            cell.innerHTML = '<div class="day-number">' + nextDay + '</div>';
            row.appendChild(cell);
            nextDay++;
        }
        if (row.children.length > 0) calendarBody.appendChild(row);

        document.getElementById('monthYear').textContent = (month + 1) + '/' + year;
    }

    function previousMonth() {
        currentDate.setMonth(currentDate.getMonth() - 1);
        loadSlots();
    }

    function nextMonth() {
        currentDate.setMonth(currentDate.getMonth() + 1);
        loadSlots();
    }

    // ===== LOAD SLOTS FOR SELECTED SERVICE =====
    function loadSlots() {
        if (!selectedService) {
            slotsByDate = {};
            generateCalendar();
            return;
        }
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth() + 1;
        const url = '/api/booking/slots?serviceId=' + selectedService.serviceId +
            '&year=' + year + '&month=' + month;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                slotsByDate = {};
                data.forEach(slot => {
                    if (!slotsByDate[slot.slotDate]) slotsByDate[slot.slotDate] = [];
                    slotsByDate[slot.slotDate].push(slot);
                });
                generateCalendar();
            })
            .catch(err => {
                console.error('Lỗi tải khung giờ:', err);
                slotsByDate = {};
                generateCalendar();
            });
    }

    // ===== SLOT MODAL =====
    function openSlotModal(dateStr) {
        const daySlots = slotsByDate[dateStr] || [];
        const content = document.getElementById('slotModalContent');
        document.getElementById('slotModalTitle').innerHTML =
            '<i class="fas fa-clock"></i> Khung giờ ngày ' + formatDate(dateStr);
        content.innerHTML = '';

        daySlots.forEach(slot => {
            const btn = document.createElement('button');
            btn.type = 'button';
            const remaining = (slot.capacity || 0) - (slot.bookedCount || 0);
            if (slot.bookable) {
                btn.className = 'slot-btn';
                btn.innerHTML = slot.startTime + ' - ' + slot.endTime +
                    '<small>còn ' + remaining + ' chỗ</small>';
                btn.onclick = () => { closeSlotModal(); openBookingModal(slot); };
            } else {
                btn.className = 'slot-btn disabled';
                btn.disabled = true;
                btn.innerHTML = slot.startTime + ' - ' + slot.endTime +
                    '<small>' + (slot.isPast ? 'đã qua' : 'hết chỗ') + '</small>';
            }
            content.appendChild(btn);
        });

        document.getElementById('slotModal').classList.add('active');
    }

    function closeSlotModal() {
        document.getElementById('slotModal').classList.remove('active');
    }

    // ===== BOOKING MODAL =====
    function openBookingModal(slot) {
        selectedSlot = slot;
        const price = selectedService.price || 0;
        const pct = selectedService.depositPercent || 50;
        const deposit = price * pct / 100;

        document.getElementById('bookingSummary').innerHTML =
            '<div class="detail-row"><i class="fas fa-concierge-bell"></i> <strong>' + selectedService.name + '</strong></div>' +
            '<div class="detail-row"><i class="fas fa-store"></i> ' + (selectedService.shopName || '') + '</div>' +
            '<div class="detail-row"><i class="fas fa-calendar"></i> ' + formatDate(slot.slotDate) + '</div>' +
            '<div class="detail-row"><i class="fas fa-clock"></i> ' + slot.startTime + ' - ' + slot.endTime + '</div>' +
            '<div class="detail-row"><i class="fas fa-tag"></i> Giá: <strong>' + formatMoney(price) + 'đ</strong></div>';

        document.getElementById('depositLabel').textContent = pct + '%';
        document.getElementById('depositAmount').textContent = formatMoney(deposit);
        document.getElementById('fullAmount').textContent = formatMoney(price);

        document.getElementById('bookingForm').reset();
        // reset đặt lại radio mặc định
        const depRadio = document.querySelector('input[name="paymentType"][value="DEPOSIT"]');
        if (depRadio) depRadio.checked = true;

        document.getElementById('bookingModal').classList.add('active');
    }

    function closeBookingModal() {
        document.getElementById('bookingModal').classList.remove('active');
        selectedSlot = null;
    }

    function submitBooking(e) {
        e.preventDefault();
        if (!selectedSlot) return;

        // Chặn client-side: không đăng ký ngày quá khứ
        const today = new Date();
        const todayStr = today.getFullYear() + '-' +
            String(today.getMonth() + 1).padStart(2, '0') + '-' +
            String(today.getDate()).padStart(2, '0');
        if (selectedSlot.slotDate < todayStr) {
            alert('Không thể đăng ký lịch trong quá khứ');
            return;
        }

        const paymentType = document.querySelector('input[name="paymentType"]:checked').value;

        const data = {
            slotId: String(selectedSlot.slotId),
            petId: document.getElementById('formPetId').value || null,
            note: document.getElementById('formNote').value || null,
            paymentType: paymentType
        };

        fetch('/api/booking/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(async res => {
            if (!res.ok) {
                const msg = await res.text();
                throw new Error(msg || 'Đăng ký thất bại');
            }
            return res.json();
        })
        .then(() => {
            closeBookingModal();
            alert('Đăng ký lịch thành công!');
            loadSlots();
            loadMyBookings();
        })
        .catch(err => alert(err.message));
    }

    // ===== MY BOOKINGS =====
    function loadMyBookings() {
        fetch('/api/booking/my')
            .then(res => res.json())
            .then(data => renderBookingList(data))
            .catch(err => console.error('Lỗi tải lịch đã đặt:', err));
    }

    function renderBookingList(items) {
        const list = document.getElementById('bookingList');
        const noMsg = document.getElementById('noBookingsMsg');

        const active = (items || []).filter(b => b.status !== 'CANCELLED');
        if (active.length === 0) {
            list.innerHTML = '';
            list.appendChild(noMsg);
            noMsg.style.display = 'block';
            return;
        }
        noMsg.style.display = 'none';
        list.innerHTML = '';

        const statusLabels = {
            'PENDING': 'Chờ xác nhận', 'CONFIRMED': 'Đã xác nhận',
            'COMPLETED': 'Hoàn thành', 'CANCELLED': 'Đã hủy'
        };
        const payLabels = { 'NONE': 'Trả tại shop', 'DEPOSIT': 'Đã cọc', 'FULL': 'Đã trả đủ' };

        active.forEach(b => {
            const div = document.createElement('div');
            div.className = 'schedule-item';
            div.innerHTML =
                '<div class="event-info">' +
                    '<div class="event-name">' + (TYPE_ICONS[b.serviceType] || '') + ' ' + b.serviceName + '</div>' +
                    '<div class="event-pet"><i class="fas fa-store"></i> ' + (b.shopName || '') + '</div>' +
                    '<div class="event-pet"><i class="fas fa-calendar"></i> ' + formatDate(b.slotDate) +
                        ' · ' + b.startTime + '-' + b.endTime + '</div>' +
                    '<div class="event-pet"><span class="status-tag status-' + b.status + '">' +
                        (statusLabels[b.status] || b.status) + '</span> · ' +
                        (payLabels[b.paymentType] || b.paymentType) + '</div>' +
                '</div>' +
                '<button class="delete-btn" onclick="cancelBooking(' + b.bookingId + ')" title="Hủy lịch">' +
                    '<i class="fas fa-times"></i>' +
                '</button>';
            list.appendChild(div);
        });
    }

    function cancelBooking(bookingId) {
        if (!confirm('Bạn có chắc muốn hủy lịch này?')) return;
        fetch('/api/booking/' + bookingId, { method: 'DELETE' })
            .then(res => {
                if (!res.ok) throw new Error('Hủy thất bại');
                loadMyBookings();
                loadSlots();
            })
            .catch(err => alert(err.message));
    }

    // ===== HELPERS =====
    function formatDate(dateStr) {
        const parts = dateStr.split('-');
        return parseInt(parts[2]) + '/' + parseInt(parts[1]) + '/' + parts[0];
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function() {
        loadServices();
        loadMyBookings();
        generateCalendar();
    });

    document.getElementById('slotModal').addEventListener('click', function(e) {
        if (e.target === this) closeSlotModal();
    });
    document.getElementById('bookingModal').addEventListener('click', function(e) {
        if (e.target === this) closeBookingModal();
    });
</script>

</div>

</body>
</html>
