<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ - PawPals</title>

    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/header.css}" />
    <link rel="stylesheet" th:href="@{/map.css}" />
</head>
<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<div class="map-page">
    <!-- SIDEBAR -->
    <div class="map-sidebar">
        <h2><i class="fas fa-map-marked-alt"></i> Bản đồ</h2>

        <!-- Vị trí của tôi -->
        <div class="sidebar-section">
            <button class="my-location-btn" onclick="getMyLocation()">
                <i class="fas fa-location-dot"></i> Vị trí của tôi
            </button>
            <div class="location-error" id="locationError"></div>
        </div>

        <!-- Tìm kiếm -->
        <div class="sidebar-section">
            <h3><i class="fas fa-search"></i> Tìm kiếm</h3>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="VD: Phòng khám thú y, Spa, Pet shop..."
                       onkeypress="if(event.key==='Enter') searchPlaces()">
                <button onclick="searchPlaces()"><i class="fas fa-search"></i></button>
            </div>
            <div class="loading-spinner" id="searchSpinner">
                <i class="fas fa-spinner"></i> Đang tìm kiếm...
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Phương tiện di chuyển -->
        <div class="sidebar-section">
            <h3><i class="fas fa-car"></i> Phương tiện</h3>
            <div class="transport-buttons" id="transportButtons">
                <div class="transport-btn active" data-profile="driving" onclick="selectTransport('driving', this)">
                    <i class="fas fa-car"></i> Ô tô
                </div>
                <div class="transport-btn" data-profile="motorcycle" onclick="selectTransport('motorcycle', this)">
                    <i class="fas fa-motorcycle"></i> Xe máy
                </div>
                <div class="transport-btn" data-profile="walking" onclick="selectTransport('walking', this)">
                    <i class="fas fa-walking"></i> Đi bộ
                </div>
                <div class="transport-btn" data-profile="cycling" onclick="selectTransport('cycling', this)">
                    <i class="fas fa-bicycle"></i> Xe đạp
                </div>
            </div>
        </div>

        <!-- Danh mục -->
        <div class="sidebar-section">
            <h3><i class="fas fa-tags"></i> Danh mục</h3>
            <div class="category-tags">
                <span class="category-tag active" data-category="all" onclick="filterCategory('all', this)">Tất cả</span>
                <span class="category-tag" data-category="veterinary" onclick="filterCategory('veterinary', this)">🏥 Thú y</span>
                <span class="category-tag" data-category="pet_store" onclick="filterCategory('pet_store', this)">🛒 Pet shop</span>
                <span class="category-tag" data-category="pet_groomer" onclick="filterCategory('pet_groomer', this)">💆 Spa</span>
                <span class="category-tag" data-category="park" onclick="filterCategory('park', this)">🌳 Công viên</span>
            </div>
        </div>

        <!-- Panel chỉ đường -->
        <div class="direction-panel hidden" id="directionPanel">
            <div class="direction-header">
                <h4><i class="fas fa-route"></i> Chỉ đường</h4>
                <button onclick="clearDirection()">✕ Đóng</button>
            </div>
            <div class="direction-summary" id="directionSummary"></div>
            <div class="direction-info" id="directionInfo">
                <span><i class="fas fa-circle"></i> <span id="dirFrom">---</span></span>
                <span><i class="fas fa-flag-checkered"></i> <span id="dirTo">---</span></span>
            </div>
            <div class="direction-info" id="directionStats">
                <span><i class="fas fa-road"></i> Khoảng cách: <strong id="dirDistance">---</strong></span>
                <span><i class="fas fa-clock"></i> Thời gian: <strong id="dirDuration">---</strong></span>
            </div>
            <div class="direction-steps" id="directionSteps"></div>
        </div>

        <!-- Danh sách địa điểm -->
        <div class="sidebar-section">
            <h3><i class="fas fa-list"></i> Địa điểm</h3>
            <div class="place-list" id="placeList">
                <div class="info-box">
                    <i class="fas fa-map-pin" style="font-size: 24px; display: block; margin-bottom: 6px;"></i>
                    Bấm "Vị trí của tôi" để tìm địa điểm gần bạn
                </div>
            </div>
        </div>
    </div>

    <!-- MAP -->
    <div class="map-container">
        <div id="map"></div>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ===== STATE =====
    const DEFAULT_LAT = 21.0285;
    const DEFAULT_LNG = 105.8542;

    let map;
    let userLocation = null;
    let userMarker = null;
    let routeLine = null;
    let routeStartMarker = null;
    let routeEndMarker = null;
    let placeMarkers = [];
    let clickMarkers = [];

    let currentCategory = 'all';
    let currentTransport = 'driving';
    let searchResults = [];
    let currentDestination = null;

    // ===== INIT MAP =====
    function initMap() {
        map = L.map('map', {
            center: [DEFAULT_LAT, DEFAULT_LNG],
            zoom: 14,
            zoomControl: true
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19
        }).addTo(map);

        map.on('click', function(e) {
            reverseGeocode(e.latlng.lat, e.latlng.lng);
        });
    }

    // ===== GEOLOCATION =====
    function getMyLocation() {
        const errorDiv = document.getElementById('locationError');
        errorDiv.classList.remove('active');

        if (!navigator.geolocation) {
            showLocationError('Trình duyệt không hỗ trợ định vị.');
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                userLocation = { lat, lng };

                if (userMarker) map.removeLayer(userMarker);

                const icon = L.divIcon({
                    className: 'custom-marker user',
                    html: '<i class="fas fa-user"></i>',
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                });

                userMarker = L.marker([lat, lng], { icon })
                    .addTo(map)
                    .bindPopup('<strong>📍 Vị trí của bạn</strong>')
                    .openPopup();

                map.setView([lat, lng], 15);
                searchNearbyPlaces(lat, lng);

                if (currentDestination) {
                    calculateRoute(currentDestination.lat, currentDestination.lng, currentDestination.name);
                }
            },
            function(error) {
                let message = '⚠️ Không thể lấy vị trí. ';
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        message += 'Vui lòng cấp quyền truy cập vị trí trong trình duyệt.';
                        break;
                    case error.POSITION_UNAVAILABLE:
                        message += 'Thông tin vị trí không khả dụng.';
                        break;
                    case error.TIMEOUT:
                        message += 'Yêu cầu vị trí đã hết thời gian.';
                        break;
                    default:
                        message += 'Lỗi không xác định.';
                }
                showLocationError(message);
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    }

    function showLocationError(msg) {
        const errorDiv = document.getElementById('locationError');
        errorDiv.textContent = msg;
        errorDiv.classList.add('active');
        setTimeout(() => errorDiv.classList.remove('active'), 6000);
    }

    // ===== SELECT TRANSPORT =====
    function selectTransport(profile, element) {
        currentTransport = profile;
        document.querySelectorAll('.transport-btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');

        if (currentDestination && userLocation) {
            calculateRoute(currentDestination.lat, currentDestination.lng, currentDestination.name);
        }
    }

    // ===== SEARCH =====
    async function searchPlaces(query) {
        const input = document.getElementById('searchInput');
        const q = (query || input.value).trim();
        if (!q) return;

        const spinner = document.getElementById('searchSpinner');
        spinner.classList.add('active');

        try {
            const url = 'https://nominatim.openstreetmap.org/search?format=json&q=' +
                encodeURIComponent(q) +
                '&limit=15&addressdetails=1&accept-language=vi&dedup=1';

            const res = await fetch(url, { headers: { 'User-Agent': 'PawPals/1.0' } });
            const data = await res.json();

            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '';
            searchResults = data;

            if (data.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">Không tìm thấy địa điểm nào</div>';
                return;
            }

            data.forEach((item, idx) => {
                const lat = parseFloat(item.lat);
                const lng = parseFloat(item.lon);
                const name = item.display_name.split(',')[0] || item.display_name;

                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.innerHTML =
                    '<div class="result-name">📍 ' + name + '</div>' +
                    '<div class="result-address">' + item.display_name.substring(0, 80) + '...</div>';
                div.onclick = () => {
                    flyToPlace(lat, lng, name, 'search-' + idx);
                    addToPlaceList([{ lat, lng, name, address: item.display_name, category: 'search' }]);
                    // Hiển thị marker + popup tại vị trí chính xác
                    clearClickMarkers();
                    const icon = L.divIcon({
                        className: 'custom-marker end',
                        html: '<i class="fas fa-map-pin"></i>',
                        iconSize: [36, 36],
                        iconAnchor: [18, 36]
                    });
                    const marker = L.marker([lat, lng], { icon })
                        .addTo(map)
                        .bindPopup(
                            '<strong>📍 ' + name + '</strong><br>' +
                            item.display_name.substring(0, 80) + '...<br><br>' +
                            '<button onclick="showDirectionByLatLng(' + lat + ', ' + lng + ', \'' +
                                name.replace(/'/g, "\\'") + '\')" ' +
                                'style="padding:6px 14px;border:none;border-radius:8px;background:#a89ce4;color:white;cursor:pointer;font-family:Fredoka,sans-serif;">' +
                                '<i class="fas fa-route"></i> Chỉ đường đến đây</button>'
                        )
                        .openPopup();
                    clickMarkers.push(marker);
                };
                resultsDiv.appendChild(div);
            });

        } catch (err) {
            console.error('Search error:', err);
            document.getElementById('searchResults').innerHTML =
                '<div class="no-results">Lỗi tìm kiếm. Vui lòng thử lại.</div>';
        } finally {
            spinner.classList.remove('active');
        }
    }

    // ===== SEARCH NEARBY (Overpass API) =====
    async function searchNearbyPlaces(lat, lng) {
        const spinner = document.getElementById('searchSpinner');
        spinner.classList.add('active');

        try {
            const query = `[out:json];
            (
                node["amenity"="veterinary"](around:5000,${lat},${lng});
                node["shop"="pet"](around:5000,${lat},${lng});
                node["amenity"="animal_grooming"](around:5000,${lat},${lng});
                node["leisure"="dog_park"](around:5000,${lat},${lng});
                node["leisure"="park"](around:5000,${lat},${lng});
                way["amenity"="veterinary"](around:5000,${lat},${lng});
                way["shop"="pet"](around:5000,${lat},${lng});
                way["leisure"="dog_park"](around:5000,${lat},${lng});
                way["leisure"="park"](around:5000,${lat},${lng});
            );
            out center;`;

            const res = await fetch('https://overpass-api.de/api/interpreter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'data=' + encodeURIComponent(query)
            });

            const data = await res.json();
            const elements = data.elements || [];

            const places = elements
                .map(el => {
                    const ptLat = el.lat || (el.center && el.center.lat);
                    const ptLng = el.lon || (el.center && el.center.lon);
                    if (!ptLat || !ptLng) return null;

                    let category = 'pet_store';
                    if (el.tags) {
                        if (el.tags.amenity === 'veterinary') category = 'veterinary';
                        else if (el.tags.shop === 'pet') category = 'pet_store';
                        else if (el.tags.amenity === 'animal_grooming') category = 'pet_groomer';
                        else if (el.tags.leisure === 'dog_park' || el.tags.leisure === 'park') category = 'park';
                    }
                    return {
                        lat: ptLat,
                        lng: ptLng,
                        name: el.tags?.name || el.tags?.amenity || el.tags?.shop || el.tags?.leisure || 'Địa điểm',
                        address: el.tags?.['addr:full'] || el.tags?.['addr:street'] || '',
                        category
                    };
                })
                .filter(p => p !== null);

            const unique = [];
            const seen = new Set();
            places.forEach(p => {
                const key = p.name + p.lat + p.lng;
                if (!seen.has(key)) { seen.add(key); unique.push(p); }
            });

            const deduped = [];
            for (const p of unique) {
                let tooClose = false;
                for (const q of deduped) {
                    const d = Math.sqrt(Math.pow(p.lat - q.lat, 2) + Math.pow(p.lng - q.lng, 2));
                    if (d < 0.003) { tooClose = true; break; }
                }
                if (!tooClose) deduped.push(p);
            }

            searchResults = deduped;
            renderPlaces(deduped);

        } catch (err) {
            console.error('Overpass error:', err);
        } finally {
            spinner.classList.remove('active');
        }
    }

    // ===== RENDER PLACES =====
    function renderPlaces(places) {
        const list = document.getElementById('placeList');
        list.innerHTML = '';
        clearPlaceMarkers();

        let filtered = places;
        if (currentCategory !== 'all') {
            filtered = places.filter(p => p.category === currentCategory);
        }

        if (filtered.length === 0) {
            list.innerHTML = '<div class="no-results">Không có địa điểm nào</div>';
            return;
        }

        filtered.forEach((place, idx) => {
            const card = document.createElement('div');
            card.className = 'place-card';
            card.id = 'place-' + idx;

            const icons = {
                'veterinary': '🏥', 'pet_store': '🛒', 'pet_groomer': '💆',
                'park': '🌳', 'search': '📍'
            };
            const icon = icons[place.category] || '📍';

            card.innerHTML =
                '<div class="place-name">' + icon + ' ' + place.name + '</div>' +
                '<div class="place-address">' + (place.address || '') + '</div>' +
                '<div class="place-actions">' +
                    '<button class="btn-direction" onclick="event.stopPropagation(); showDirection(' + idx + ')">' +
                        '<i class="fas fa-route"></i> Chỉ đường</button>' +
                    '<button class="btn-view" onclick="event.stopPropagation(); flyToPlace(' +
                        place.lat + ', ' + place.lng + ', \'' + place.name.replace(/'/g, "\\'") + '\', ' + idx + ')">' +
                        '<i class="fas fa-eye"></i> Xem</button>' +
                '</div>';

            card.onclick = () => {
                flyToPlace(place.lat, place.lng, place.name, idx);
                // Optionally, directly show direction to this place upon card click
                // showDirectionByLatLng(place.lat, place.lng, place.name);
            };
            list.appendChild(card);

            addPlaceMarker(place.lat, place.lng, place.name, idx, place.category);
        });
    }

    function addToPlaceList(places) {
        const existing = Array.isArray(searchResults) ? searchResults : [];
        const merged = [...existing];
        places.forEach(p => {
            const dup = merged.find(m =>
                Math.abs(m.lat - p.lat) < 0.001 && Math.abs(m.lng - p.lng) < 0.001
            );
            if (!dup) merged.push(p);
        });
        searchResults = merged;
        renderPlaces(searchResults);
    }

    // ===== MARKERS =====
    function clearPlaceMarkers() {
        placeMarkers.forEach(m => map.removeLayer(m));
        placeMarkers = [];
    }

    function clearClickMarkers() {
        clickMarkers.forEach(m => map.removeLayer(m));
        clickMarkers = [];
    }

    function addPlaceMarker(lat, lng, name, index, category) {
        const icon = L.divIcon({
            className: 'custom-marker',
            html: '<i class="fas fa-map-pin" style="font-size: 16px;"></i>',
            iconSize: [36, 36],
            iconAnchor: [18, 36],
            popupAnchor: [0, -36]
        });

        const marker = L.marker([lat, lng], { icon }).addTo(map);

        marker.bindPopup(
            '<strong>📍 ' + name + '</strong><br><br>' +
            '<button class="btn-dir" onclick="showDirectionByLatLng(' + lat + ', ' + lng + ', \'' +
                name.replace(/'/g, "\\'") + '\')" ' +
                'style="padding:6px 14px;border:none;border-radius:8px;background:#a89ce4;color:white;cursor:pointer;font-family:Fredoka,sans-serif;">' +
                '<i class="fas fa-route"></i> Chỉ đường đến đây</button>'
        );

        placeMarkers.push(marker);
    }

    function flyToPlace(lat, lng, name, index) {
        map.setView([lat, lng], 16);
        document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
        const el = document.getElementById('place-' + index);
        if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    }

    // ===== REVERSE GEOCODE =====
    async function reverseGeocode(lat, lng) {
        try {
            const url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' +
                lat + '&lon=' + lng + '&accept-language=vi';
            const res = await fetch(url, { headers: { 'User-Agent': 'PawPals/1.0' } });
            const data = await res.json();
            const name = data.display_name || 'Vị trí đã chọn';

            clearClickMarkers();

            const icon = L.divIcon({
                className: 'custom-marker end',
                html: '<i class="fas fa-map-pin"></i>',
                iconSize: [36, 36],
                iconAnchor: [18, 36]
            });

            const marker = L.marker([lat, lng], { icon })
                .addTo(map)
                .bindPopup(
                    '<strong>📍 Vị trí đã chọn</strong><br>' +
                    name.substring(0, 80) + '...<br><br>' +
                    '<button class="btn-dir" onclick="showDirectionByLatLng(' + lat + ', ' + lng + ', \'Vị trí đã chọn\')" ' +
                        'style="padding:6px 14px;border:none;border-radius:8px;background:#a89ce4;color:white;cursor:pointer;font-family:Fredoka,sans-serif;">' +
                        '<i class="fas fa-route"></i> Chỉ đường đến đây</button>'
                )
                .openPopup();

            clickMarkers.push(marker);
        } catch (err) {
            console.error('Reverse geocode error:', err);
        }
    }

    // ===== FILTER CATEGORY =====
    function filterCategory(category, element) {
        currentCategory = category;
        document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        renderPlaces(searchResults);
    }

    // ===== SHOW DIRECTION =====
    function showDirection(index) {
        const place = searchResults[index];
        if (!place) return;
        if (!userLocation) { alert('⚠️ Vui lòng bấm "Vị trí của tôi" trước.'); return; }
        calculateRoute(place.lat, place.lng, place.name);
    }

    function showDirectionByLatLng(lat, lng, name) {
        if (!userLocation) { alert('⚠️ Vui lòng bấm "Vị trí của tôi" trước.'); return; }
        calculateRoute(lat, lng, name);
    }

    // ===== CALCULATE ROUTE (OSRM only, simplified) =====
    async function calculateRoute(toLat, toLng, toName) {
        if (!userLocation) {
            alert('⚠️ Vui lòng bấm "Vị trí của tôi" trước khi chỉ đường.');
            return;
        }

        currentDestination = { lat: toLat, lng: toLng, name: toName };

        const panel = document.getElementById('directionPanel');
        panel.classList.remove('hidden');

        document.getElementById('directionSummary').textContent = '📍 Điểm đến: ' + toName;
        document.getElementById('dirFrom').textContent = 'Vị trí của bạn';
        document.getElementById('dirTo').textContent = toName;
        document.getElementById('dirDistance').textContent = 'Đang tính...';
        document.getElementById('dirDuration').textContent = 'Đang tính...';
        document.getElementById('directionSteps').innerHTML =
            '<div class="loading-spinner active"><i class="fas fa-spinner"></i> Đang tìm đường...</div>';

        try {
            // Map transport to OSRM profile + điều chỉnh tốc độ
            let profile = currentTransport;
            let speedFactor = 1.0; // Ô tô: 1.0 (chuẩn)
            if (currentTransport === 'walking') { profile = 'foot'; speedFactor = 1.0; }
            else if (currentTransport === 'cycling') { profile = 'bicycle'; speedFactor = 1.0; }
            else if (currentTransport === 'motorcycle') { profile = 'driving'; speedFactor = 1.3; } // Xe máy chậm hơn ô tô ~30%

            const url = 'https://router.project-osrm.org/route/v1/' + profile + '/' +
                userLocation.lng + ',' + userLocation.lat + ';' +
                toLng + ',' + toLat +
                '?overview=full&geometries=geojson&steps=true&alternatives=false';

            const response = await fetch(url);
            const data = await response.json();

            if (!data.routes || data.routes.length === 0) {
                document.getElementById('directionSteps').innerHTML =
                    '<div class="no-results">⚠️ Không tìm thấy đường đi</div>';
                document.getElementById('dirDistance').textContent = '---';
                document.getElementById('dirDuration').textContent = '---';
                return;
            }

            const route = data.routes[0];
            const distanceKm = (route.distance / 1000).toFixed(1);
            // Áp dụng speedFactor: xe máy *1.3, ô tô *1.0, đi bộ/xe đạp *1.0 (OSRM đã tính đúng)
            let durationMin = Math.round(route.duration / 60);
            if (currentTransport === 'motorcycle') {
                durationMin = Math.round(durationMin * 1.3); // Xe máy chậm hơn ô tô 30%
            }

            let durationText = '';
            if (durationMin < 60) {
                durationText = durationMin + ' phút';
            } else {
                const h = Math.floor(durationMin / 60);
                const m = durationMin % 60;
                durationText = h + ' giờ ' + m + ' phút';
            }

            document.getElementById('dirDistance').textContent = distanceKm + ' km';
            document.getElementById('dirDuration').textContent = durationText;

            // Steps
            const stepsContainer = document.getElementById('directionSteps');
            stepsContainer.innerHTML = '';

            const legs = route.legs[0].steps;

            legs.forEach((step) => {
                const instruction = step.maneuver?.instruction || step.name || 'Đi tiếp';
                const dist = step.distance > 1000
                    ? (step.distance / 1000).toFixed(1) + ' km'
                    : Math.round(step.distance) + ' m';

                const icon = getDirectionFaIcon(step.maneuver?.type);

                const div = document.createElement('div');
                div.className = 'direction-step';
                div.innerHTML =
                    '<span class="step-icon"><i class="' + icon + '"></i></span>' +
                    '<span>' + instruction + ' <em>(' + dist + ')</em></span>';
                stepsContainer.appendChild(div);
            });

            // Draw route
            if (routeLine) map.removeLayer(routeLine);

            routeLine = L.geoJSON(route.geometry, {
                style: {
                    color: '#a89ce4',
                    weight: 5,
                    opacity: 0.85
                }
            }).addTo(map);

            map.fitBounds(routeLine.getBounds(), { padding: [60, 60] });

            // Start/End markers
            if (routeStartMarker) map.removeLayer(routeStartMarker);
            if (routeEndMarker) map.removeLayer(routeEndMarker);

            const startIcon = L.divIcon({
                className: 'custom-marker start',
                html: '<i class="fas fa-play"></i>',
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });
            const endIcon = L.divIcon({
                className: 'custom-marker end',
                html: '<i class="fas fa-flag-checkered"></i>',
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });

            routeStartMarker = L.marker([userLocation.lat, userLocation.lng], { icon: startIcon }).addTo(map);
            routeEndMarker = L.marker([toLat, toLng], { icon: endIcon }).addTo(map);

        } catch (err) {
            console.error('Route error:', err);
            document.getElementById('directionSteps').innerHTML =
                '<div class="no-results">⚠️ Lỗi tính toán đường đi. Vui lòng thử lại.</div>';
            document.getElementById('dirDistance').textContent = '---';
            document.getElementById('dirDuration').textContent = '---';
        }
    }

    function getDirectionFaIcon(type) {
        const icons = {
            'turn': 'fas fa-arrow-right',
            'continue': 'fas fa-arrow-up',
            'depart': 'fas fa-play',
            'arrive': 'fas fa-flag',
            'merge': 'fas fa-compress-alt',
            'ramp': 'fas fa-arrow-right',
            'fork': 'fas fa-code-branch',
            'end of road': 'fas fa-arrow-right',
            'roundabout': 'fas fa-sync',
            'rotary': 'fas fa-sync',
            'exit': 'fas fa-sign-out-alt',
            'new name': 'fas fa-arrow-up',
            'notification': 'fas fa-bell'
        };
        return icons[type] || 'fas fa-arrow-right';
    }

    // ===== CLEAR DIRECTION =====
    function clearDirection() {
        document.getElementById('directionPanel').classList.add('hidden');
        if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
        if (routeStartMarker) { map.removeLayer(routeStartMarker); routeStartMarker = null; }
        if (routeEndMarker) { map.removeLayer(routeEndMarker); routeEndMarker = null; }
        currentDestination = null;
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function() {
        initMap();
        getMyLocation();
    });
</script>

</body>
</html>
