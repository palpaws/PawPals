<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | PawPals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/password-reset.css}">
    <link rel="stylesheet" th:href="@{/header.css}">
</head>
<body>
<div class="reset-page">
    <div th:replace="fragments/header :: header"></div>

    <section class="reset-section">
        <div class="reset-card">
            <h2>Đặt lại mật khẩu</h2>

            <div th:if="${error}" style="background-color: #ffeef0; color: #d73a49; border: 1px solid rgba(215, 58, 73, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; font-family: sans-serif;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${error}"></span>
            </div>

            <form class="reset-form" th:action="@{/reset-password}" method="post">
                <div class="input-group">
                    <input type="password" id="passwordInput" name="password" placeholder="Mật khẩu mới" required>
                </div>

                <div class="password-requirements">
                    <div class="requirement" id="req-length">
                        <i class="fas fa-circle"></i> Ít nhất 8 ký tự
                    </div>
                    <div class="requirement" id="req-uppercase">
                        <i class="fas fa-circle"></i> Chứa chữ in hoa (A-Z)
                    </div>
                    <div class="requirement" id="req-lowercase">
                        <i class="fas fa-circle"></i> Chứa chữ in thường (a-z)
                    </div>
                    <div class="requirement" id="req-number">
                        <i class="fas fa-circle"></i> Chứa số (0-9)
                    </div>
                </div>

                <div class="input-group">
                    <input type="password" id="confirmPasswordInput" name="confirmPassword" placeholder="Xác nhận mật khẩu" required>
                </div>

                <input type="hidden" name="token" th:value="${resetToken}">

                <button type="submit" class="reset-btn" id="submitBtn" disabled>Đặt lại mật khẩu</button>
            </form>

            <p class="back-link">
                <a th:href="@{/login}">← Quay lại đăng nhập</a>
            </p>
        </div>
    </section>
</div>

<script>
const passwordInput = document.getElementById('passwordInput');
const confirmPasswordInput = document.getElementById('confirmPasswordInput');
const submitBtn = document.getElementById('submitBtn');

const requirements = {
    length: document.getElementById('req-length'),
    uppercase: document.getElementById('req-uppercase'),
    lowercase: document.getElementById('req-lowercase'),
    number: document.getElementById('req-number')
};

function validatePassword() {
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    const checks = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password)
    };

    Object.entries(checks).forEach(([key, isValid]) => {
        const element = requirements[key];
        if (isValid) {
            element.classList.add('valid');
            element.querySelector('i').classList.remove('fa-circle');
            element.querySelector('i').classList.add('fa-check-circle');
        } else {
            element.classList.remove('valid');
            element.querySelector('i').classList.remove('fa-check-circle');
            element.querySelector('i').classList.add('fa-circle');
        }
    });

    const allValid = Object.values(checks).every(v => v);
    const passwordMatch = password === confirmPassword && password.length > 0;

    submitBtn.disabled = !(allValid && passwordMatch);
}

passwordInput.addEventListener('input', validatePassword);
confirmPasswordInput.addEventListener('input', validatePassword);
</script>
</body>
</html>
