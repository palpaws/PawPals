<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu | PawPals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/password-reset.css}">
    <link rel="stylesheet" th:href="@{/header.css}">
    <div th:replace="fragments/google-analytics :: googleAnalytics"></div>
</head>
<body>
<div class="reset-page">
    <div th:replace="fragments/header :: header"></div>

    <section class="reset-section">
        <div class="reset-card">
            <h2>Quên mật khẩu</h2>

            <div th:if="${error}" style="background-color: #ffeef0; color: #d73a49; border: 1px solid rgba(215, 58, 73, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; font-family: sans-serif;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${error}"></span>
            </div>

            <form class="reset-form" th:action="@{/forgot-password}" method="post">
                <div class="input-group">
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <button type="submit" class="reset-btn">Gửi mã</button>
            </form>

            <p class="back-link">
                <a th:href="@{/login}">← Trở lại trang chủ</a>
            </p>
        </div>
    </section>
</div>
</body>
</html>
