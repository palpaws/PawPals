<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - PawPals</title>

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Font giống mẫu -->
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600&family=Hannari&display=swap" rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <link rel="stylesheet" th:href="@{/register.css}">
    <!-- HEADER CSS -->
    <link rel="stylesheet" th:href="@{/header.css}">
    <style>
        .password-requirements {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-size: 14px;
            display: none;
        }

        .password-requirements.show {
            display: block;
        }

        .requirement {
            padding: 6px 0;
            color: #6c757d;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .requirement .icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #dee2e6;
            color: #6c757d;
            font-size: 12px;
            font-weight: bold;
        }

        .requirement.met {
            color: #28a745;
        }

        .requirement.met .icon {
            background-color: #28a745;
            color: white;
        }

        #password-match-message {
            font-weight: 500;
        }

        #password-match-message.match {
            color: #28a745;
        }

        #password-match-message.no-match {
            color: #d73a49;
        }
    </style>
    <div th:replace="fragments/google-analytics :: googleAnalytics"></div>
</head>
<body>

<!-- HEADER -->
<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- REGISTER -->
<section class="register-section">

    <div class="register-card">

        <h1>Đăng ký</h1>

        <form th:action="@{/register}" method="post">

            <!-- Error message -->
                <div th:if="${error}" style="background-color: #ffeef0; color: #d73a49; border: 1px solid rgba(215, 58, 73, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; font-family: 'Work Sans', sans-serif;">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span th:text="${error}"></span>
                </div>

            <div class="input-box">
                <input type="text" name="fullName" th:value="${fullNameVal}" placeholder="Họ và tên" required>
            </div>

            <div class="input-box">
                <input type="email" name="email" th:value="${emailVal}" placeholder="Email" required>
            </div>

            <div class="input-box" style="position: relative;">
                <input type="password" id="password" name="password" placeholder="Mật khẩu" required
                       pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{8,}$"
                       title="Mật khẩu phải có ít nhất 8 kí tự, bao gồm chữ hoa, chữ thường và số"
                       style="padding-right: 45px;">
                <span style="position: absolute; right: 16px; top: 15px; cursor: pointer; color: #989898; font-size: 18px; z-index: 2;"
                      onclick="togglePasswordVisibility('password', this)">
                    <i class="fas fa-eye"></i>
                </span>
                <div class="password-requirements">
                    <div class="requirement" id="req-length">
                        <span class="icon">✓</span> Ít nhất 8 kí tự
                    </div>
                    <div class="requirement" id="req-uppercase">
                        <span class="icon">✓</span> Chứa chữ hoa (A-Z)
                    </div>
                    <div class="requirement" id="req-lowercase">
                        <span class="icon">✓</span> Chứa chữ thường (a-z)
                    </div>
                    <div class="requirement" id="req-number">
                        <span class="icon">✓</span> Chứa số (0-9)
                    </div>
                </div>
            </div>

            <div class="input-box" style="position: relative;">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Xác nhận mật khẩu" required
                       style="padding-right: 45px;">
                <span style="position: absolute; right: 16px; top: 15px; cursor: pointer; color: #989898; font-size: 18px; z-index: 2;"
                      onclick="togglePasswordVisibility('confirmPassword', this)">
                    <i class="fas fa-eye"></i>
                </span>
                <div id="password-match-message" style="margin-top: 8px; font-size: 14px; display: none;"></div>
            </div>

            <button type="submit" class="register-button">
                Đăng ký
            </button>

        </form>

        <p class="bottom-text">
            Đã có tài khoản?
            <a th:href="@{/login}">
                Đăng nhập ngay
            </a>
        </p>

    </div>

</section>

<script>
    function togglePasswordVisibility(inputId, toggleEl) {
        const input = document.getElementById(inputId);
        const icon = toggleEl.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const passwordRequirements = document.querySelector('.password-requirements');
    const passwordMatchMessage = document.getElementById('password-match-message');

    const requirements = {
        length: document.getElementById('req-length'),
        uppercase: document.getElementById('req-uppercase'),
        lowercase: document.getElementById('req-lowercase'),
        number: document.getElementById('req-number')
    };

    function validatePassword(password) {
        const checks = {
            length: password.length >= 8,
            uppercase: /[A-Z]/.test(password),
            lowercase: /[a-z]/.test(password),
            number: /\d/.test(password)
        };

        Object.keys(requirements).forEach(key => {
            if (checks[key]) {
                requirements[key].classList.add('met');
            } else {
                requirements[key].classList.remove('met');
            }
        });

        return Object.values(checks).every(check => check);
    }

    function validatePasswordMatch() {
        if (confirmPasswordInput.value === '') {
            passwordMatchMessage.style.display = 'none';
            return;
        }

        if (passwordInput.value === confirmPasswordInput.value) {
            passwordMatchMessage.classList.remove('no-match');
            passwordMatchMessage.classList.add('match');
            passwordMatchMessage.style.display = 'block';
        } else {
            passwordMatchMessage.classList.remove('match');
            passwordMatchMessage.classList.add('no-match');
            passwordMatchMessage.style.display = 'block';
        }
    }

    passwordInput.addEventListener('input', () => {
        if (passwordInput.value.length > 0) {
            passwordRequirements.classList.add('show');
            validatePassword(passwordInput.value);
        } else {
            passwordRequirements.classList.remove('show');
        }
        confirmPasswordInput.value = '';
        passwordMatchMessage.style.display = 'none';
    });

    confirmPasswordInput.addEventListener('input', validatePasswordMatch);
</script>

</body>
</html>
