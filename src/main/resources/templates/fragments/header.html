<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>

<header class="header" th:fragment="header">

    <div class="logo">
        <img th:src="@{/images/img5.png}" alt="Logo">
    </div>

    <nav class="navbar">
        <a th:href="@{/}">Trang Chủ</a>

        <a th:href="@{/calendar}">Lịch</a>
        <a th:href="@{/map}">Bản đồ</a>
        <a th:href="@{/pet-match}">Ghép đôi</a>
        <a th:href="@{/base-profile}">Bạn&Bé</a>
        <a th:href="@{/community}">Cộng Đồng</a>
    </nav>

    <!-- Auth Action Buttons -->
    <div th:if="${session != null and session.currentUser != null}" style="display: flex; align-items: center; gap: 15px;">
        <!-- Notification Bell -->
        <div class="notification-bell-wrapper">
            <button class="notification-bell" id="notificationBell" aria-label="Thông báo">
                <i class="fas fa-bell"></i>
                <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
            </button>
            <!-- Dropdown -->
            <div class="notification-dropdown" id="notificationDropdown">
                <div class="dropdown-header">
                    <h3>Thông báo</h3>
                    <button class="mark-all-read" id="markAllRead">Đánh dấu tất cả đã đọc</button>
                </div>
                <div class="dropdown-body" id="notificationList">
                    <div class="dropdown-empty">Không có thông báo</div>
                </div>
                <div class="dropdown-footer">
                    <a th:href="@{/notifications}">Xem tất cả thông báo</a>
                </div>
            </div>
        </div>
        <span th:if="${session.currentUser != null}"

              style="
        font-size:16px;
        font-weight:700;
        display:flex;
        align-items:center;
        gap:6px;
      ">


    <!-- Crown Premium -->
    <i th:if="${session.currentUser.premiumExpiredAt != null
        && session.currentUser.premiumExpiredAt.isAfter(T(java.time.LocalDateTime).now())}"

       class="fa-solid fa-crown"

       style="
        color:#FFD166;
        font-size:18px;
       ">
    </i>


            <!-- Tên Premium -->
    <span th:if="${session.currentUser.premiumExpiredAt != null
        && session.currentUser.premiumExpiredAt.isAfter(T(java.time.LocalDateTime).now())}"

          th:text="${'Xin chào, ' + session.currentUser.fullName}"

          style="
            color:#FFD166;
            text-shadow:0 1px 5px rgba(0,0,0,0.25);
          ">
    </span>


            <!-- Tên User thường -->
    <span th:if="${session.currentUser.premiumExpiredAt == null
        || !session.currentUser.premiumExpiredAt.isAfter(T(java.time.LocalDateTime).now())}"

          th:text="${'Xin chào, ' + session.currentUser.fullName}"

          style="
            color:#143f38;
          ">
    </span>


</span>

    </div>
    
    <div th:if="${session == null or session.currentUser == null}" style="display: flex; align-items: center; gap: 20px;">
        <a th:href="@{/login}" style="text-decoration: none; font-size: 16px; font-weight: 600; color: #143f38; transition: 0.3s;" onmouseover="this.style.color='#eb6f99'" onmouseout="this.style.color='#143f38'">
            Đăng nhập
        </a>
        <a th:href="@{/register}">
            <button class="top-btn">
                Đăng Ký
            </button>
        </a>
    </div>

    <script th:src="@{/notification.js}"></script>
    <script>
        // Font Awesome check - load if missing
        if (!document.querySelector('link[href*="font-awesome"]') && !document.querySelector('link[href*="fontawesome"]')) {
            var fa = document.createElement('link');
            fa.rel = 'stylesheet';
            fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css';
            document.head.appendChild(fa);
        }
    </script>

</header>
