<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập | PawPals</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- ICON -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <!-- LOGIN CSS -->
    <link rel="stylesheet" th:href="@{/login.css}">

    <!-- HEADER CSS -->
    <link rel="stylesheet" th:href="@{/header.css}">
    <div th:replace="fragments/google-analytics :: googleAnalytics"></div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

<div class="login-page">

    <!-- HEADER -->
    <div th:replace="fragments/header :: header"></div>

    <!-- LOGIN -->
    <section class="login-section">

        <div class="login-card">

            <h2>Đăng nhập</h2>

            <!-- Error message -->
            <div th:if="${error}" style="background-color: #ffeef0; color: #d73a49; border: 1px solid rgba(215, 58, 73, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; font-family: sans-serif;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Success message -->
            <div th:if="${success}" style="background-color: #e6f6ec; color: #28a745; border: 1px solid rgba(40, 167, 69, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; font-family: sans-serif;">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${success}"></span>
            </div>

            <form class="login-form"
                  th:action="@{/login}"
                  method="post">

                <div class="input-group">

                    <input type="email"
                           id="emailInput"
                           name="email"
                           th:value="${emailVal}"
                           placeholder="Email"
                           required>

                </div>

                <div class="input-group" style="position: relative;">

                    <input type="password"
                           id="passwordInput"
                           name="password"
                           placeholder="Mật khẩu"
                           required
                           style="padding-right: 45px;">

                    <span toggle="#passwordInput"
                          class="password-toggle"
                          style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #9a9a9a; font-size: 18px; z-index: 2;"
                          onclick="togglePasswordVisibility('passwordInput', this)">
                        <i class="fas fa-eye"></i>
                    </span>

                </div>

                <div class="login-options">

                    <label class="remember-box">

                        <input type="checkbox" id="rememberCheckbox" name="rememberMe">

                        <span>Ghi nhớ đăng nhập</span>

                    </label>

                    <a th:href="@{/forgot-password}">
                        Quên mật khẩu?
                    </a>

                </div>

                <button type="submit"
                        class="login-btn-form">

                    Đăng nhập

                </button>

            </form>

            <div class="divider">
                <span>hoặc tiếp tục với</span>
            </div>

            <div id="googleButton" class="google-btn-wrapper">
                <!-- Google button will be rendered here by JS -->
            </div>

            <p class="register-text">

                Bạn chưa có tài khoản?

                <a th:href="@{/register}">
                    Đăng ký ngay
                </a>

            </p>

        </div>

    </section>

</div>

<script>
    // ===== Google Sign-In callback =====
    function handleGoogleCredential(response) {
        if (!response || !response.credential) {
            alert('Lỗi đăng nhập Google. Vui lòng thử lại.');
            return;
        }

        // Show loading state
        const wrapper = document.getElementById('googleButton');
        if (wrapper) {
            wrapper.style.opacity = '0.5';
            wrapper.style.pointerEvents = 'none';
        }

        // Send credential to backend
        fetch('/login/google', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'credential=' + encodeURIComponent(response.credential)
        })
        .then(function(res) {
            if (res.ok) return res.json();
            return res.json().then(function(data) {
                throw new Error(data.error || 'Đăng nhập Google thất bại');
            });
        })
        .then(function(data) {
            if (data && data.success) {
                window.location.href = data.redirect || '/';
            }
        })
        .catch(function(err) {
            alert(err.message);
            if (wrapper) {
                wrapper.style.opacity = '1';
                wrapper.style.pointerEvents = 'auto';
            }
        });
    }

    // ===== Initialize Google button when GSI loads =====
    function initGoogleSignIn() {
        if (typeof google !== 'undefined' && google.accounts) {
            google.accounts.id.initialize({
                client_id: '209721092643-gcdtu1jktv4uhiklff2k6o2l5obrf5e7.apps.googleusercontent.com',
                callback: handleGoogleCredential
            });
            google.accounts.id.renderButton(
                document.getElementById('googleButton'),
                { type: 'standard', shape: 'rectangular', theme: 'outline', text: 'signin_with', size: 'large', width: 300 }
            );
        }
    }

    // ===== Password toggle =====
    function togglePasswordVisibility(inputId, toggleEl) {
        const input = document.getElementById(inputId);
        const icon = toggleEl.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // ===== Remember email =====
    const emailInput = document.getElementById('emailInput');
    const rememberCheckbox = document.getElementById('rememberCheckbox');

    document.addEventListener('DOMContentLoaded', function() {
        const savedEmail = localStorage.getItem('rememberedEmail');
        if (savedEmail) {
            emailInput.value = savedEmail;
            rememberCheckbox.checked = true;
        }
    });

    rememberCheckbox.addEventListener('change', function() {
        if (rememberCheckbox.checked && emailInput.value) {
            localStorage.setItem('rememberedEmail', emailInput.value);
        } else {
            localStorage.removeItem('rememberedEmail');
        }
    });

    emailInput.addEventListener('change', function() {
        if (rememberCheckbox.checked && emailInput.value) {
            localStorage.setItem('rememberedEmail', emailInput.value);
        }
    });

    // Initialize Google Sign-In with polling until GSI is ready
    function waitForGoogleAndInit() {
        if (typeof google !== 'undefined' && google.accounts) {
            initGoogleSignIn();
        } else {
            setTimeout(waitForGoogleAndInit, 200);
        }
    }
    waitForGoogleAndInit();
</script>

</body>
</html>
