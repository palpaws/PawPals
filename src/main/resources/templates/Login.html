<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập | PawPals</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- ICON -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <!-- LOGIN CSS -->
    <link rel="stylesheet" th:href="@{/login.css}">

    <!-- HEADER CSS -->
    <link rel="stylesheet" th:href="@{/header.css}">

</head>

<body>

<div class="login-page">

    <!-- HEADER -->
    <div th:replace="fragments/header :: header"></div>

    <!-- LOGIN -->
    <section class="login-section">

        <div class="login-card">

            <h2>Đăng nhập</h2>

            <!-- Error message -->
            <div th:if="${error}" style="background-color: #ffeef0; color: #d73a49; border: 1px solid rgba(215, 58, 73, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; font-family: sans-serif;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Success message -->
            <div th:if="${success}" style="background-color: #e6f6ec; color: #28a745; border: 1px solid rgba(40, 167, 69, 0.4); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; justify-content: center; font-family: sans-serif;">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${success}"></span>
            </div>

            <form class="login-form"
                  th:action="@{/login}"
                  method="post">

                <div class="input-group">

                    <input type="email"
                           id="emailInput"
                           name="email"
                           th:value="${emailVal}"
                           placeholder="Email"
                           required>

                </div>

                <div class="input-group">

                    <input type="password"
                           id="passwordInput"
                           name="password"
                           placeholder="Mật khẩu"
                           required>

                </div>

                <div class="login-options">

                    <label class="remember-box">

                        <input type="checkbox" id="rememberCheckbox" name="rememberMe">

                        <span>Ghi nhớ đăng nhập</span>

                    </label>

                    <a href="#">
                        Quên mật khẩu?
                    </a>

                </div>

                <button type="submit"
                        class="login-btn-form">

                    Đăng nhập

                </button>

            </form>

            <p class="register-text">

                Bạn chưa có tài khoản?

                <a th:href="@{/register}">
                    Đăng ký ngay
                </a>

            </p>

        </div>

    </section>

</div>

<script>
    const emailInput = document.getElementById('emailInput');
    const rememberCheckbox = document.getElementById('rememberCheckbox');

    // Load remembered email on page load
    document.addEventListener('DOMContentLoaded', () => {
        const savedEmail = localStorage.getItem('rememberedEmail');
        if (savedEmail) {
            emailInput.value = savedEmail;
            rememberCheckbox.checked = true;
        }
    });

    // Save email when checkbox is checked/unchecked
    rememberCheckbox.addEventListener('change', () => {
        if (rememberCheckbox.checked && emailInput.value) {
            localStorage.setItem('rememberedEmail', emailInput.value);
        } else {
            localStorage.removeItem('rememberedEmail');
        }
    });

    // Update saved email when email input changes
    emailInput.addEventListener('change', () => {
        if (rememberCheckbox.checked && emailInput.value) {
            localStorage.setItem('rememberedEmail', emailInput.value);
        }
    });
</script>

</body>
</html>
