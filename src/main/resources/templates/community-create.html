<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tạo bài viết mới trong cộng đồng PawPals.">
    <title>Tạo bài viết - PawPals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/header.css}">
    <link rel="stylesheet" th:href="@{/footer.css}">
    <link rel="stylesheet" th:href="@{/community.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container community-page-wrapper">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <a href="/community" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Quay lại bảng tin
                </a>

                <div class="card form-card">
                    <div class="card-header">
                        <i class="bi bi-plus-circle me-2" style="color:#ea7da3;"></i> Tạo bài viết mới
                    </div>
                    <div class="card-body">
                        <form th:action="@{/community/create}" th:object="${createPostDto}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Tiêu đề <span class="text-danger">*</span></label>
                                <input type="text" id="title" th:field="*{title}" class="form-control"
                                       placeholder="Đặt tiêu đề cho bài viết của bạn..." required>
                            </div>

                            <div class="mb-3">
                                <label for="categoryId" class="form-label">Danh mục <span class="text-danger">*</span></label>
                                <select id="categoryId" th:field="*{categoryId}" class="form-select" required>
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.categoryId}"
                                            th:text="${cat.categoryName}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="thumbnailUrl" class="form-label">URL ảnh đại diện</label>
                                <input type="url" id="thumbnailUrl" th:field="*{thumbnailUrl}" class="form-control"
                                       placeholder="https://example.com/image.jpg">
                                <div class="form-text" style="color:rgba(29,61,57,0.60);">
                                    Không bắt buộc: Thêm URL ảnh để bài viết thêm nổi bật.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="content" class="form-label">Nội dung <span class="text-danger">*</span></label>
                                <textarea id="content" th:field="*{content}" class="form-control" rows="12"
                                          placeholder="Chia sẻ suy nghĩ, mẹo hay hoặc câu chuyện của bạn..." required></textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a href="/community" class="btn btn-secondary" style="border-radius:50px; font-family:'Baloo 2',cursive; font-weight:600;">
                                    Hủy
                                </a>
                                <button type="submit" class="btn-create-post" style="padding:10px 28px;">
                                    <i class="bi bi-send-fill"></i> Đăng bài
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
