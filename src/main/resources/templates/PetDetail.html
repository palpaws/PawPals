<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Chi tiết thú cưng</title>


    <link rel="stylesheet"
          th:href="@{/header.css}">


    <link rel="stylesheet"
          th:href="@{/pet-detail.css}">


    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>


<body>


<div th:replace="~{fragments/header :: header}"></div>



<div class="pet-detail-container">


    <!-- ================= UPDATE FORM ================= -->

    <form method="post"
          th:action="@{/pets/{id}/update(id=${pet.petId})}">



        <!-- PROFILE HEADER -->

        <div class="pet-profile-card">


            <div class="pet-avatar">

                <img
                        th:src="${pet.images != null && !pet.images.isEmpty()
                    ? pet.images[0].imageUrl
                    : '/images/default-pet.jpg'}"
                        alt="pet">

            </div>




            <div class="pet-profile-info">


                <h1>

                    <i class="fa-solid fa-paw"></i>


                    <input class="edit-input name-input"
                           name="petName"
                           th:value="${pet.petName}">

                </h1>




                <div class="pet-badges">


                <span class="badge">

                    <i class="fa-solid fa-dog"></i>

                    <span th:text="${pet.species}">
                    </span>

                </span>




                    <span class="badge">

                    <i class="fa-solid fa-venus-mars"></i>

                    <span th:text="${pet.gender}">
                    </span>

                </span>




                    <span class="badge status">

                    <i class="fa-solid fa-circle"></i>

                    <span th:text="${pet.status}">
                    </span>

                </span>


                </div>




                <p class="microchip">

                    <i class="fa-solid fa-microchip"></i>

                    Microchip:

                    <b th:text="${pet.microchipCode}">
                    </b>

                </p>



            </div>


        </div>





        <!-- BASIC INFO -->


        <div class="detail-card">


            <h2>

                <i class="fa-solid fa-circle-info"></i>

                Thông tin cơ bản

            </h2>




            <div class="info-grid">



                <div>

                    <label>Giống</label>

                    <input class="edit-input"
                           name="breed"
                           th:value="${pet.breed}">

                </div>




                <div>

                    <label>Màu sắc</label>

                    <input class="edit-input"
                           name="color"
                           th:value="${pet.color}">

                </div>




                <div>

                    <label>Ngày sinh</label>

                    <input class="edit-input"
                           type="date"
                           name="dateOfBirth"
                           th:value="${pet.dateOfBirth}">

                </div>




                <div>

                    <label>Sinh nhật</label>

                    <input class="edit-input"
                           type="date"
                           name="birthday"
                           th:value="${pet.birthday}">

                </div>


            </div>


        </div>





        <!-- BODY -->


        <div class="detail-card">


            <h2>

                <i class="fa-solid fa-ruler"></i>

                Ngoại hình

            </h2>



            <div class="info-grid">



                <div>

                    <label>Cân nặng (kg)</label>

                    <input class="edit-input"
                           type="number"
                           step="0.1"
                           name="weight"
                           th:value="${pet.weight}">


                </div>





                <div>

                    <label>Chiều cao (cm)</label>

                    <input class="edit-input"
                           type="number"
                           step="0.1"
                           name="height"
                           th:value="${pet.height}">


                </div>


            </div>


        </div>






        <!-- HEALTH -->


        <div class="detail-card health">


            <h2>

                <i class="fa-solid fa-heart-pulse"></i>

                Sức khỏe

            </h2>




            <div class="info-grid">



                <div>

                    <label>Nhóm máu</label>

                    <input class="edit-input"
                           name="bloodType"
                           th:value="${pet.bloodType}">

                </div>





                <div>

                    <label>
                        <i class="fa-solid fa-syringe"></i>
                        Lịch sử vaccine
                    </label>



                    <div th:if="${pet.vaccinations != null && !pet.vaccinations.isEmpty()}">


                        <div th:each="v : ${pet.vaccinations}">


                            <p>

                                💉

                                <b th:text="${v.vaccine.vaccineName}">
                                </b>


                                -

                                <span th:text="${v.status}">
                            </span>


                            </p>


                        </div>


                    </div>




                    <p th:if="${pet.vaccinations == null || pet.vaccinations.isEmpty()}">

                        Chưa có vaccine

                    </p>


                </div>





                <div>

                    <label>Triệt sản</label>

                    <p th:text="${pet.sterilized != null && pet.sterilized ? 'Đã triệt sản':'Chưa'}">
                    </p>

                </div>





                <div>

                    <label>Lần khám cuối</label>


                    <input class="edit-input"
                           type="date"
                           name="lastVetVisit"
                           th:value="${pet.lastVetVisit}">

                </div>


            </div>






            <label>Tình trạng sức khỏe</label>


            <input class="edit-input"
                   name="healthStatus"
                   th:value="${pet.healthStatus}">





            <br><br>





            <label>Dị ứng</label>


            <p th:text="${pet.allergies}">
            </p>




            <label>Bệnh mãn tính</label>


            <p th:text="${pet.chronicDiseases}">
            </p>



        </div>
        <!-- ================= BEHAVIOR ================= -->


        <div class="detail-card">


            <h2>

                <i class="fa-solid fa-dog"></i>

                Hành vi

            </h2>




            <label>Tính cách</label>


            <input class="edit-input"
                   name="temperament"
                   th:value="${pet.temperament}">





            <br><br>





            <label>Mức độ hoạt động</label>


            <input class="edit-input"
                   name="activityLevel"
                   th:value="${pet.activityLevel}">



        </div>






        <!-- ================= MATCH ================= -->


        <div class="detail-card">


            <h2>

                <i class="fa-solid fa-heart"></i>

                Ghép đôi

            </h2>





            <p>

                Trạng thái:


                <b th:text="${pet.isAvailableForMatching != null && pet.isAvailableForMatching ? 'Có thể ghép đôi':'Không'}">
                </b>


            </p>




            <p th:text="${pet.matchingDescription}">
            </p>



        </div>






        <!-- ================= SAVE UPDATE ================= -->


        <button class="save-btn"
                type="submit">


            <i class="fa-solid fa-floppy-disk"></i>


            Lưu thay đổi


        </button>



    </form>






    <!-- ================= ADD VACCINE FORM ================= -->


    <div class="detail-card">


        <h2>

            <i class="fa-solid fa-syringe"></i>

            Thêm vaccine

        </h2>




        <form method="post"
              th:action="@{/pets/{id}/vaccination(id=${pet.petId})}">



            <label>

                Chọn vaccine

            </label>




            <select class="edit-input"
                    name="vaccineId">



                <option th:each="v : ${vaccines}"

                        th:value="${v.vaccineId}"

                        th:text="${v.vaccineName}">

                </option>



            </select>





            <br><br>





            <label>

                Ngày tiêm

            </label>




            <input class="edit-input"

                   type="date"

                   name="injectionDate"

                   required>






            <br><br>





            <label>

                Ngày tiêm tiếp theo

            </label>




            <input class="edit-input"

                   type="date"

                   name="nextDueDate">






            <br><br>





            <button class="save-btn"

                    type="submit">


                <i class="fa-solid fa-syringe"></i>


                Lưu vaccine



            </button>



        </form>



    </div>







    <br>






    <a class="back-btn"

       th:href="@{/pets}">


        <i class="fa-solid fa-arrow-left"></i>


        Quay lại danh sách


    </a>





</div>






</body>

</html>
