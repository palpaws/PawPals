<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" th:content="${post.title} + ' – PawPals Community'">
    <title th:text="${post.title} + ' - PawPals'">Chi tiết bài viết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/header.css}">
    <link rel="stylesheet" th:href="@{/footer.css}">
    <link rel="stylesheet" th:href="@{/community.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container community-page-wrapper">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <a href="/community" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Quay lại bảng tin
                </a>

                <article class="card post-detail-card">
                    <div th:if="${post.thumbnailUrl}" class="card-img-top-wrapper">
                        <img th:src="${post.thumbnailUrl}" class="detail-thumbnail" alt="Thumbnail">
                    </div>
                    <div class="card-body">
                        <!-- Title & Edit/Delete -->
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <span class="badge bg-info mb-2" th:text="${post.categoryName}"></span>
                                <h1 class="card-title" style="font-size:1.8rem; font-weight:800; color:#163f36; line-height:1.2;"
                                    th:text="${post.title}"></h1>
                            </div>
                            <div th:if="${currentUser != null and (currentUser.userId == post.authorId or currentUser.role == 'ADMIN')}"
                                 class="dropdown ms-3">
                                <button class="btn btn-sm" type="button" data-bs-toggle="dropdown"
                                        style="background:rgba(255,255,255,0.55); border:1.5px solid rgba(200,200,220,0.4); border-radius:50px; padding:6px 14px;">
                                    <i class="bi bi-three-dots"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li>
                                        <a class="dropdown-item" th:href="@{/community/edit/{id}(id=${post.postId})}">
                                            <i class="bi bi-pencil me-2" style="color:#5d6fd6;"></i> Chỉnh sửa
                                        </a>
                                    </li>
                                    <li>
                                        <form th:action="@{/community/delete/{id}(id=${post.postId})}" method="post"
                                              style="display:inline;">
                                            <button type="submit" class="dropdown-item text-danger"
                                                    onclick="return confirm('Bạn có chắc chắn muốn xóa bài viết này?')">
                                                <i class="bi bi-trash me-2"></i> Xóa
                                            </button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <!-- Author & Date -->
                        <div class="d-flex align-items-center mb-4 gap-3">
                            <div class="avatar-circle">
                                <span th:text="${#strings.substring(post.authorName, 0, 1)}"></span>
                            </div>
                            <div>
                                <strong class="author-name" th:text="${post.authorName}"></strong>
                                <small class="text-muted d-block" style="font-size:0.82rem;">
                                    <i class="bi bi-clock"></i>
                                    Đăng vào <span th:text="${#temporals.format(post.createdAt, 'HH:mm dd/MM/yyyy')}"></span>
                                    <span th:if="${post.updatedAt != null}">
                                        · Cập nhật: <span th:text="${#temporals.format(post.updatedAt, 'HH:mm dd/MM/yyyy')}"></span>
                                    </span>
                                </small>
                            </div>
                        </div>

                        <hr style="border-color: rgba(29,61,57,0.12);">

                        <!-- Content -->
                        <div class="post-content mb-4" th:text="${post.content}"></div>

                        <hr style="border-color: rgba(29,61,57,0.12);">

                        <!-- Like & Comment count -->
                        <div class="d-flex align-items-center gap-4 mb-4">
                            <button id="likeBtn" class="like-btn btn"
                                    th:classappend="${post.likedByCurrentUser} ? 'btn-danger' : 'btn-outline-danger'"
                                    th:attr="data-post-id=${post.postId}">
                                <i class="bi" th:classappend="${post.likedByCurrentUser} ? 'bi-heart-fill' : 'bi-heart'"></i>
                                 <span id="likeCount" th:text="${post.likeCount}"></span> Thích
                            </button>
                            <span style="color: rgba(29,61,57,0.65); font-weight:600;">
                                <i class="bi bi-chat-fill" style="color:#5d6fd6;"></i>
                                 <span id="commentCount" th:text="${post.commentCount}"></span> Bình luận
                            </span>
                        </div>

                        <!-- Comment Form -->
                            <div th:if="${currentUser != null}" class="comment-form mb-4">
                            <h5><i class="bi bi-chat-dots" style="color:#ea7da3;"></i> Để lại bình luận</h5>
                            <div class="input-group">
                                <textarea id="commentContent" class="form-control" rows="2"
                                          placeholder="Viết bình luận của bạn..."></textarea>
                                <button class="btn btn-primary" style="border-radius: 0 10px 10px 0; font-family:'Baloo 2',cursive; font-weight:700;"
                                        th:attr="data-post-id=${post.postId}"
                                        onclick="submitComment(this.getAttribute('data-post-id'))">
                                    <i class="bi bi-send"></i> Đăng
                                </button>
                            </div>
                        </div>
                        <div th:if="${currentUser == null}" class="alert alert-info">
                            <i class="bi bi-info-circle me-2"></i>
                            <a href="/login" style="color:#ea7da3; font-weight:700;">Đăng nhập</a> để bình luận.
                        </div>

                        <!-- Comments Section -->
                        <div id="commentsSection" class="comments-section">
                            <h5><i class="bi bi-chat-square-text" style="color:#5d6fd6;"></i> Bình luận</h5>
                            <div th:if="${#lists.isEmpty(comments)}" class="empty-state" style="padding:30px 0;">
                                <i class="bi bi-chat-dots" style="font-size:2.5rem;"></i>
                                <p>Chưa có bình luận nào. Hãy là người đầu tiên bình luận!</p>
                            </div>
                            <!-- Comments are rendered by community.js via API on page load -->
                            <div th:each="comment : ${comments}" class="comment-tree">
                                <div th:replace="~{fragments/comment-fragment :: commentNode(${comment})}"></div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var currentUserId = [[${currentUser != null ? currentUser.userId : null}]];
        var currentUserName = [[${currentUser != null ? currentUser.fullName : ''}]];
        var postId = [[${post.postId}]];
        /*]]>*/
    </script>
    <script th:src="@{/community.js}"></script>
</body>
</html>
